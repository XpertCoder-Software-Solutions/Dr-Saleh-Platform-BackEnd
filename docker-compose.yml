services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dr-saleh-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dr_saleh_platform?schema=public
      JWT_SECRET: replace-with-a-strong-secret-at-least-32-chars
      JWT_EXPIRES_IN: 1d
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CORS_CREDENTIALS: false
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_TLS: false
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: dr-saleh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dr_saleh_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dr_saleh_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dr-saleh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
